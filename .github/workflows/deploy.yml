name: ECS Blue-Gren Deploy

on:
  push:
    branches: [ release ]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECS_CLUSTER_NAME: ecs-cluster-42195km

jobs:
  deploy:
    strategy:
      matrix:
        ecr-repo: [ blue-green ]
        service-name: [ blue-green-service ]

    runs-on: ubuntu-lateest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v4

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        working-directory:
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.ecr-repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f Dockerfile .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition --task-definition ${ matrix.service-name } --query taskDefinition > task-def.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-write-task-definition@v2
        with:
          task-definition: task-def.json
          container-name: ${ matrix.service-name }
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v3
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${ matrix.service-name }
          cluster: ${ env.ECS_CLUSTER_NAME }
          wait-for-service-stability: true
          codedeploy-appspec: appspec.yml
          codedeploy-application: my-codedeploy-application
          codedeploy-deployment-group: my-codedeploy-deployment-group
