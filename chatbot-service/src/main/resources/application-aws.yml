server:
  port: ${CHATBOT_SERVER}

spring:
  application:
    name: chatbot-service

  datasource:
    url: ${DB_CHATBOT_URL}
    username: ${DB_CHATBOT_USERNAME}
    password: ${DB_CHATBOT_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch

    vertex:
      ai:
        gemini:
          project-id: ${PROJECT-ID}
          location: us-central1
          credentials:
            location: classpath:${ACCOUNT}.json
          chat:
            model: gemini-1.5-flash-001
            temperature: 0.7

        embedding:
          project-id: ${PROJECT-ID}
          location: us-central1
          text:
            options:
              model: text-embedding-004

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER}
  instance:
    non-secure-port: ${CHATBOT_SERVER}
