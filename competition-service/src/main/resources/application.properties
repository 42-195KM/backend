spring.application.name=competition-service

spring.config.import=optional:file:.env[.properties]
server.port=${COMPETITION_SERVER}

spring.datasource.url=${DB_COMPETITION_URL}
spring.datasource.username=${DB_COMPETITION_USERNAME}
spring.datasource.password=${DB_COMPETITION_PASSWORD}

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone= ${EUREKA_SERVER}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.auto-commit=false

logging.level.root=INFO
logging.level.com._42195km.msa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=competition_state_group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
kafka.topic.competition-saga=competition_saga

saga.ttl.hours=24

# Redis ??
spring.data.redis.host=${DB_REDIS_HOST}
spring.data.redis.port=${DB_REDIS_PORT}
spring.data.redis.username=${DB_REDIS_USERNAME}
spring.data.redis.password=${DB_REDIS_PASSWORD}
spring.data.redis.timeout=60000

# prometheus config
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.tags.application=competition-service

# Zipkin configuration
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT}