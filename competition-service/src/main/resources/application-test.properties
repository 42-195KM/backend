spring.config.import=optional:file:../.env[.properties]

spring.kafka.enabled=false
spring.redis.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

spring.datasource.url=${DB_COMPETITION_URL}
spring.datasource.username=${DB_COMPETITION_USERNAME}
spring.datasource.password=${DB_COMPETITION_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.auto-commit=false

spring.data.redis.host=${DB_REDIS_HOST}
spring.data.redis.port=${DB_REDIS_PORT}
spring.data.redis.username=${DB_REDIS_USERNAME}
spring.data.redis.password=${DB_REDIS_PASSWORD}
spring.data.redis.timeout=60000