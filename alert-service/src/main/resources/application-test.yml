

spring:
  application:
    name: alert-service
  config:
    activate:
      on-profile: test
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:h2:mem:testdb  # 임시 메모리 DB
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    url: localhost:9092
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest


slack:
  token: ${SLACK_BOT_TOKEN}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER}
