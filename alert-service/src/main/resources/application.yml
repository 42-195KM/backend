
server:
  port: ${ALERT_SERVER}

spring:
  application:
    name: alert-service
  config:
    activate:
      on-profile: dev
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_ALERT_URL}
    username: ${DB_ALERT_USERNAME}
    password: ${DB_ALERT_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    url: localhost:9092
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest


slack:
  token: ${SLACK_BOT_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: alert-service

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER}

