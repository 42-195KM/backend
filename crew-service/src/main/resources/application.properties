spring.application.name=crew
spring.config.import=optional:file:.env[.properties]
server.port=19009

spring.datasource.url=${SPRING_CREW_DATASOURCE_URL}
spring.datasource.username=${SPRING_CREW_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_CREW_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.auto-commit=false

logging.level.root=INFO
logging.level.com._42195km.msa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG