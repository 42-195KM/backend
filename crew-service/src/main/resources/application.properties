spring.application.name=crew-service
spring.config.import=optional:file:.env[.properties]
server.port=${CREW_SERVER}

spring.datasource.url=${DB_CREW_URL}
spring.datasource.username=${DB_CREW_USERNAME}
spring.datasource.password=${DB_CREW_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone= ${EUREKA_SERVER}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.auto-commit=false

logging.level.root=INFO
logging.level.com._42195km.msa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG