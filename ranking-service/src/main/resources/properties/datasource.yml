spring:
  datasource:
    url: ${DB_RANKING_URL}
    username: ${DB_RANKING_USERNAME}
    password: ${DB_RANKING_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      auto-commit: false
  sql:
    init:
      mode: always
      # 더미데이터
#      data-locations: classpath:db/data.sql
