spring:
  application:
    name: ranking-service
  config:
    import:
      - optional:file:.env[.properties]
      - classpath:./properties/datasource.yml
      - classpath:./properties/jpa.yml
  profiles:
    group:
      local: local
    active: local
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER}  # Eureka 서버 URL
server:
  port: ${RANKING_SERVER}