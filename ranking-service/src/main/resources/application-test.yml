spring:
  application:
    name: ranking-service
  config:
    import:
      - optional:file:../.env[.properties]
      - classpath:./properties/datasource.yml
      - classpath:./properties/jpa.yml

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER}
server:
  port: ${RANKING_SERVER}